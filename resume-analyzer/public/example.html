<!DOCTYPE html>
<html>
<head>
    <title>Media Query Website</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
        }

        .container{
            background-color:skyblue;
            padding:40px;
            text-align:center;
        }

        h1{
            color:darkblue;
            font-size:40px;
        }

        p{
            font-size:20px;
        }

        /* Media Query for Mobile */

        @media screen and (max-width:600px){

            body{
                background-color:lightyellow;
            }

            h1{
                color:red;
                font-size:25px;
            }

            p{
                font-size:16px;
            }

            .container{
                padding:20px;
            }
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>My Simple Website</h1>

        <p>This website uses media query.</p>

    </div>

</body>
</html>
